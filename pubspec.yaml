name: nanna_platform
description: A platform-adaptive UI extension for the Nanna Flutter package, providing dynamic fallback rendering for Material and Cupertino widgets.
version: 1.1.0
repository: https://github.com/pisolofin/nanna-flutter-platform
issue_tracker: https://github.com/pisolofin/nanna-flutter-platform/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  nanna: ^1.0.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
